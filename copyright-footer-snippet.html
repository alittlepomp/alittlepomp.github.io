<!--
  COPYRIGHT FOOTER SNIPPET — alittlepomp.com
  ============================================
  Drop this into your existing <footer> element on each page
  (gallery, about, contact). If you don't have a <footer> yet,
  wrap this in one and place it just before your closing </body> tag.

  The year updates automatically via JS, so you never have to
  touch it again. If you'd rather hardcode the year, just replace
  the <span id="copyright-year"></span> and script with the year itself.
-->

<footer class="site-footer">
  <p class="copyright-notice">
    &copy; <span id="copyright-year"></span> alittlepomp. All artwork and site content
    are original works and may not be reproduced, copied, or used without
    written permission. See <a href="/contact.html">contact</a> for usage
    inquiries.
  </p>
</footer>

<script>
  document.getElementById('copyright-year').textContent = new Date().getFullYear();
</script>
